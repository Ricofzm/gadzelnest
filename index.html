<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GadzelNest</title>
        
        <link rel="stylesheet" href="assets/css/style.css">
    
    </head>
    <body>
        <nav class="navbar">
    
            <div class="logo">

                <img src="assets/images/logoG.png" alt="GadzelNest Logo">
            
                <div class="logo-text">
                    <h2>GadzelNest</h2>
                    <span>TOP UP DRAGON NEST M CLASSIC</span>
                </div>
            
            </div>
        
            <button class="menu-btn">
                ☰
            </button>
        
        </nav>
        
        <section class="hero">
    
            <span class="badge">
                ⚡ Fast • Secure • Trusted
            </span>
        
            <h1>
                Top Up Dragon Nest M Classic
            </h1>
        
            <p>
                Top up Cash Dragon Nest M Classic dengan proses cepat, aman, dan harga terbaik.
            </p>
        
            <button class="hero-btn">
                Top Up Sekarang
            </button>
        
        </section>
        
        <section class="account-section">

            <div class="section-title">
        
                <div class="step-number">1</div>
        
                <h2>Masukkan Data Akun</h2>
        
            </div>
        
            <div class="account-card">
        
                <div class="input-group">
        
                    <label>Char ID</label>
        
                    <input type="text" placeholder="Masukkan Char ID">
        
                </div>
        
                <div class="input-group">
        
                    <label>Server ID</label>
        
                    <input type="text" placeholder="Masukkan Server ID">
        
                </div>
        
                <div class="info-box">
        
                    Pastikan Char ID dan Server ID yang dimasukkan sudah benar.
        
                </div>
        
            </div>
        
        </section>
        
        <script src="assets/js/script.js"></script>
    
    </body>
</html>
