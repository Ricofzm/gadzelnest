<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - GadzelNest</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<section class="admin-page">

    <div class="admin-header">
    
        <div>
            <h1>Dashboard Admin</h1>
            <p>GadzelNest Order Monitoring</p>
        </div>
    
        <button id="logoutBtn" class="logout-btn">
            Logout
        </button>
    
    </div>
    
    <div class="stats-grid">
    
        <div class="stat-card">
            <span>Total Order</span>
            <h2 id="totalOrder">0</h2>
        </div>
    
        <div class="stat-card pending-card">
            <span>Pending</span>
            <h2 id="pendingOrder">0</h2>
        </div>
    
        <div class="stat-card paid-card">
            <span>Paid</span>
            <h2 id="paidOrder">0</h2>
        </div>
    
        <div class="stat-card expired-card">
            <span>Expired</span>
            <h2 id="expiredOrder">0</h2>
        </div>
    
    </div>
    
    <div class="admin-tools">
    
        <input
            id="search"
            type="text"
            placeholder="Cari Order ID..."
        >
    
    </div>
    
    <div id="orderList"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/admin.js"></script>

</body>
</html>
