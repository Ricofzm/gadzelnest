<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Invoice - GadzelNest</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<section class="invoice-page">

<h1>Invoice Pesanan</h1>

<div class="invoice-card">

<div class="summary-row">
<span>Char ID</span>
<strong id="invoice-char"></strong>
</div>

<div class="summary-row">
<span>Server ID</span>
<strong id="invoice-server"></strong>
</div>

<div class="summary-row">
<span>Voucher</span>
<strong id="invoice-voucher"></strong>
</div>

<div class="summary-row">
<span>Pembayaran</span>
<strong id="invoice-payment"></strong>
</div>

<div class="summary-row total">
<span>Total</span>
<strong id="invoice-total"></strong>
</div>

<button class="hero-btn">
Bayar Sekarang
</button>

</div>

</section>

<script src="assets/js/invoice.js"></script>
