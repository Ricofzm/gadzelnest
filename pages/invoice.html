<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Invoice - GadzelNest</title>
        <link rel="stylesheet" href="../assets/css/style.css">
    </head>
    
    <body>
    
        <section class="invoice-page">
        
            <h1>Invoice Pesanan</h1>
            
            <div class="invoice-card">
                <div class="summary-row">
                    <span>Order ID</span>
                    <strong id="invoice-order"></strong>
                </div>
            
                <div class="summary-row">
                    <span>Char ID</span>
                    <strong id="invoice-char"></strong>
                </div>
            
                <div class="summary-row">
                    <span>Server ID</span>
                    <strong id="invoice-server"></strong>
                </div>
            
                <div class="summary-row">
                    <span>Voucher</span>
                    <strong id="invoice-voucher"></strong>
                </div>
            
                <div class="summary-row">
                    <span>Pembayaran</span>
                    <strong id="invoice-payment"></strong>
                </div>
            
                <div class="summary-row total">
                    <span>Total</span>
                    <strong id="invoice-total"></strong>
                </div>
                <p>Status :
                    <span id="invoice-status"></span>
                </p>
                                        
            </div>
            <div class="payment-status waiting">
                ⏳ Menunggu Pembayaran
            </div>
            <p>Selesaikan pembayaran dalam</p>

            <h2 id="countdown">15:00</h2>
            
            <div class="payment-box">

                <h3>Scan QRIS</h3>
            
                <img
                    id="qris-image"
                    src="../assets/images/qris.png"
                    alt="QRIS">
            
                <p>
                    Scan menggunakan DANA, OVO, GoPay,
                    Mobile Banking atau aplikasi lain.
                </p>
            
            </div>
                        
            <button id="copyOrder">
                Salin Order ID
            </button>
        </section>
    
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <script src="../assets/js/supabase.js"></script>
        <script src="../assets/js/invoice.js"></script>
    
    </body>
</html>
